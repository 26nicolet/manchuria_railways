<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滿洲騎車表 — 1940 Manchuria Railway Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Noto Serif JP', 'Georgia', serif; background:#1a1a2e; color:#e0d8c8; overflow:hidden; }

#map { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }

#topbar {
  position:absolute; top:0; left:0; right:0; z-index:1000;
  background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
  border-bottom: 2px solid #e94560;
  padding: 8px 20px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
#topbar h1 { font-size: 1.3rem; color:#e94560; letter-spacing:2px; }
#topbar h1 span { color:#e0d8c8; font-weight:300; font-size:0.8rem; margin-left:10px; }

#time-controls { display:flex; align-items:center; gap:12px; }
#time-display {
  font-size:2rem; font-weight:bold; color:#e94560;
  font-family: 'Courier New', monospace; min-width:100px; text-align:center;
}
#time-slider { width:300px; accent-color:#e94560; cursor:pointer; }
.ctrl-btn {
  background:#e94560; color:white; border:none; padding:6px 14px;
  border-radius:4px; cursor:pointer; font-size:0.9rem; font-weight:bold;
}
.ctrl-btn:hover { background:#c73650; }
.ctrl-btn.active { background:#53d769; }
#speed-display { font-size:0.8rem; color:#aaa; min-width:50px; }

#statsbar {
  position:absolute; top:52px; left:0; right:0; z-index:999;
  background:rgba(22,33,62,0.9); padding:6px 20px;
  display:flex; gap:30px; font-size:0.85rem; color:#aaa;
  border-bottom:1px solid #333;
}
.stat-val { color:#e94560; font-weight:bold; margin-left:4px; }

#station-panel {
  position:absolute; top:90px; right:12px; z-index:999;
  background:rgba(22,33,62,0.95); border-radius:8px; padding:14px;
  border:1px solid #e94560; width:340px; max-height:calc(100vh - 110px);
  overflow-y:auto; display:none;
}
#station-panel h2 { color:#e94560; font-size:1.2rem; margin-bottom:4px; }
#station-panel .sub { color:#aaa; font-size:0.8rem; margin-bottom:10px; }
#station-panel .close-btn {
  position:absolute; top:8px; right:12px; cursor:pointer; color:#e94560;
  font-size:1.2rem; background:none; border:none;
}
#station-timetable { width:100%; border-collapse:collapse; margin-top:8px; }
#station-timetable th {
  background:#e94560; color:white; padding:5px 8px; font-size:0.75rem; text-align:left;
}
#station-timetable td {
  padding:4px 8px; border-bottom:1px solid #333; font-size:0.8rem; color:#ccc;
}
#station-timetable tr:hover td { background:rgba(233,69,96,0.15); }

#train-panel {
  position:absolute; bottom:20px; right:12px; z-index:999;
  background:rgba(22,33,62,0.95); border-radius:8px; padding:14px;
  border:1px solid #53d769; width:320px; max-height:300px;
  overflow-y:auto; display:none;
}
#train-panel h2 { color:#53d769; font-size:1rem; margin-bottom:8px; }
#train-panel .close-btn {
  position:absolute; top:8px; right:12px; cursor:pointer; color:#53d769;
  font-size:1.2rem; background:none; border:none;
}
.train-stop { font-size:0.8rem; padding:3px 0; color:#ccc; border-bottom:1px solid #222; }
.train-stop .ts-time { color:#e94560; font-weight:bold; display:inline-block; width:50px; }
.train-stop .ts-station { color:#e0d8c8; }
.train-stop .ts-type { color:#888; font-size:0.7rem; margin-left:6px; }
.train-stop.active { background:rgba(83,215,105,0.2); border-radius:3px; }

#search-box { position:relative; }
#search-input {
  padding:5px 10px; border-radius:4px; border:1px solid #555;
  background:#0f3460; color:#e0d8c8; font-size:0.85rem; width:200px;
}
#search-results {
  position:absolute; top:100%; left:0; width:200px;
  background:#16213e; border:1px solid #555; border-radius:0 0 4px 4px;
  max-height:200px; overflow-y:auto; display:none; z-index:1001;
}
.search-item {
  padding:6px 10px; cursor:pointer; font-size:0.8rem; color:#ccc; border-bottom:1px solid #222;
}
.search-item:hover { background:#e94560; color:white; }

#legend {
  position:absolute; bottom:20px; left:12px; z-index:999;
  background:rgba(22,33,62,0.95); border-radius:8px; padding:10px 14px;
  border:1px solid #333; font-size:0.75rem;
}
#legend h3 { color:#e94560; margin-bottom:6px; font-size:0.8rem; }
.legend-row { display:flex; align-items:center; gap:6px; margin:3px 0; color:#ccc; }
.legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
</style>
</head>
<body>

<div id="topbar">
  <h1>滿洲汽車表<span> 1940 Railway Tracker</span></h1>
  <div id="time-controls">
    <button class="ctrl-btn" id="btn-play" onclick="togglePlay()">&#9654; Play</button>
    <button class="ctrl-btn" onclick="changeSpeed()">Speed: <span id="speed-display">1x</span></button>
    <input type="range" id="time-slider" min="0" max="1439" value="360" oninput="setTime(+this.value)">
    <div id="time-display">06:00</div>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="Search station..." oninput="onSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>

<div id="statsbar">
  <span>Active Trains: <span class="stat-val" id="stat-active">0</span></span>
</div>

<div id="station-panel">
  <button class="close-btn" onclick="closeStationPanel()">&#10005;</button>
  <h2 id="sp-name"></h2>
  <div class="sub" id="sp-sub"></div>
  <table id="station-timetable">
    <thead><tr><th>Time</th><th>Train</th><th>Next</th></tr></thead>
    <tbody id="sp-tbody"></tbody>
  </table>
</div>

<div id="train-panel">
  <button class="close-btn" onclick="closeTrainPanel()">&#10005;</button>
  <h2 id="tp-title"></h2>
  <div id="tp-stops"></div>
</div>

<div id="legend">
  <h3>Legend</h3>
  <div class="legend-row"><span style="color:#e94560;font-size:1.2em">&#9644;</span> Railway line</div>
  <div class="legend-row"><span class="legend-dot" style="background:#FFD700;width:8px;height:8px"></span> Major station (10+ trains)</div>
  <div class="legend-row"><span class="legend-dot" style="background:#4a90d9;width:6px;height:6px"></span> Station</div>
  <div class="legend-row"><span class="legend-dot" style="background:#fff;border:2px solid #e94560;width:8px;height:8px"></span> Active train</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===================== CONFIG =====================
const MAP_CENTER = [43.5, 126.5];
const MAP_ZOOM = 6;

// ===================== STATE =====================
let routes = [];
let stations = [];
let currentMinutes = 360;
let playing = false;
let speed = 30;
let tickInterval = null;

let map;
let stationMarkers = {};
let trainMarkers = {};

// Pre-computed: cumulative distances along each geometry segment
// routeGeomDists[routeIdx][segIdx] = [cumDist0, cumDist1, ...]
let routeGeomDists = [];

// ===================== INIT =====================
async function init() {
  map = L.map('map', { center: MAP_CENTER, zoom: MAP_ZOOM, zoomControl: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CARTO &copy; OSM',
    maxZoom: 19, subdomains: 'abcd',
  }).addTo(map);

  const [routeData, stationData, railwayData] = await Promise.all([
    fetch('results/route_data.json').then(r => r.json()),
    fetch('results/all_stations.json').then(r => r.json()),
    fetch('results/railway_network.json').then(r => r.json()),
  ]);

  routes = routeData;
  stations = stationData;

  // Draw railway network background
  L.geoJSON(railwayData, {
    style: { color: '#e94560', weight: 2.5, opacity: 0.7 },
    interactive: false,
  }).addTo(map);

  // Pre-compute cumulative distances for geometry interpolation
  precomputeGeomDists();

  drawStations();
  updateTrains();

  // Redraw trains on zoom so dot sizes update
  map.on('zoomend', () => updateTrains());
}

function precomputeGeomDists() {
  routeGeomDists = routes.map(route => {
    const geom = route.geometry || [];
    return geom.map(seg => {
      const dists = [0];
      for (let i = 1; i < seg.length; i++) {
        const dlat = seg[i][0] - seg[i-1][0];
        const dlon = seg[i][1] - seg[i-1][1];
        dists.push(dists[i-1] + Math.sqrt(dlat*dlat + dlon*dlon));
      }
      return dists;
    });
  });
}

// Interpolate position along a geometry segment at given fraction (0..1)
function interpGeom(seg, dists, frac) {
  if (!seg || seg.length < 2 || !dists || dists.length < 2) {
    return seg ? seg[0] : null;
  }
  const totalDist = dists[dists.length - 1];
  if (totalDist === 0) return seg[0];

  const targetDist = frac * totalDist;

  // Binary search for the right segment
  let lo = 0, hi = dists.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (dists[mid] <= targetDist) lo = mid; else hi = mid;
  }

  const segFrac = (dists[hi] - dists[lo]) > 0
    ? (targetDist - dists[lo]) / (dists[hi] - dists[lo])
    : 0;

  return [
    seg[lo][0] + (seg[hi][0] - seg[lo][0]) * segFrac,
    seg[lo][1] + (seg[hi][1] - seg[lo][1]) * segFrac,
  ];
}

function drawStations() {
  Object.values(stationMarkers).forEach(m => map.removeLayer(m));
  stationMarkers = {};

  stations.forEach(s => {
    if (s.train_count < 1) return;
    const isMajor = s.train_count >= 10;
    const marker = L.circleMarker([s.lat, s.lon], {
      radius: isMajor ? 4.5 : 3,
      fillColor: isMajor ? '#FFD700' : '#4a90d9',
      fillOpacity: isMajor ? 1.0 : 0.8,
      stroke: true,
      color: isMajor ? '#fff' : '#2c5f8a',
      weight: isMajor ? 2 : 1,
    }).addTo(map);

    marker.on('click', () => openStationPanel(s.name));
    marker.bindTooltip(s.name, { direction: 'top', offset: [0, -5] });
    stationMarkers[s.name] = marker;
  });
}

// ===================== TIME CONTROL =====================
function formatTime(minutes) {
  const h = Math.floor(minutes / 60) % 24;
  const m = Math.floor(minutes) % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

function setTime(mins) {
  currentMinutes = Math.floor(mins) % 1440;
  document.getElementById('time-slider').value = currentMinutes;
  document.getElementById('time-display').textContent = formatTime(currentMinutes);
  updateTrains();
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.innerHTML = playing ? '&#9208; Pause' : '&#9654; Play';
  btn.classList.toggle('active', playing);
  playing ? startTicker() : stopTicker();
}

function startTicker() {
  stopTicker();
  tickInterval = setInterval(() => setTime(currentMinutes + 1), 1000 / speed);
}
function stopTicker() {
  if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
}

function changeSpeed() {
  const speeds = [30, 60, 120];
  const labels = ['1x', '2x', '4x'];
  const idx = speeds.indexOf(speed);
  const next = (idx + 1) % speeds.length;
  speed = speeds[next];
  document.getElementById('speed-display').textContent = labels[next];
  if (playing) startTicker();
}

// ===================== TRAIN RENDERING =====================
function updateTrains() {
  Object.values(trainMarkers).forEach(m => map.removeLayer(m));
  trainMarkers = {};

  let activeCount = 0;
  const t = currentMinutes;
  const zoom = map.getZoom();
  // Scale dot size with zoom: small at overview, bigger when zoomed in
  const dotRadius = Math.max(3, Math.min(7, zoom - 3));

  routes.forEach((route, ri) => {
    const stops = route.stops;
    if (stops.length < 2) return;
    if (t < stops[0].time_min || t > stops[stops.length - 1].time_min) return;

    // Find active segment
    let segIdx = -1;
    for (let i = 0; i < stops.length - 1; i++) {
      if (t >= stops[i].time_min && t <= stops[i + 1].time_min) {
        segIdx = i;
        break;
      }
    }
    if (segIdx === -1) return;

    const from = stops[segIdx];
    const to = stops[segIdx + 1];
    const dur = to.time_min - from.time_min;
    const progress = dur > 0 ? (t - from.time_min) / dur : 0;

    // Interpolate along geometry if available
    let lat, lon;
    const geom = route.geometry;
    const geomDists = routeGeomDists[ri];

    if (geom && geomDists && geom[segIdx] && geom[segIdx].length >= 2) {
      const pos = interpGeom(geom[segIdx], geomDists[segIdx], progress);
      lat = pos[0]; lon = pos[1];
    } else {
      lat = from.lat + (to.lat - from.lat) * progress;
      lon = from.lon + (to.lon - from.lon) * progress;
    }

    const marker = L.circleMarker([lat, lon], {
      radius: dotRadius,
      fillColor: '#fff',
      fillOpacity: 0.95,
      stroke: true,
      color: '#e94560',
      weight: 1.5,
    }).addTo(map);
    marker.bindTooltip(
      `Train ${route.train_no}<br>${from.station} → ${to.station}`,
      { direction: 'top', offset: [0, -8] }
    );
    marker.on('click', () => openTrainPanel(route));
    trainMarkers[route.id] = marker;
    activeCount++;
  });

  document.getElementById('stat-active').textContent = activeCount;
}

// ===================== PANELS =====================
function openStationPanel(name) {
  const panel = document.getElementById('station-panel');
  const st = stations.find(s => s.name === name);

  document.getElementById('sp-name').textContent = name + ' 驛';
  document.getElementById('sp-sub').textContent =
    `${st ? st.region : ''} · ${st ? st.train_count : '?'} trains`;

  const stopsHere = [];
  routes.forEach(r => {
    r.stops.forEach((s, i) => {
      if (s.station === name) {
        const next = i < r.stops.length - 1 ? r.stops[i + 1].station : '—';
        stopsHere.push({
          time_min: s.time_min,
          time: formatTime(s.time_min),
          train: r.train_no,
          next,
        });
      }
    });
  });
  stopsHere.sort((a, b) => a.time_min - b.time_min);

  const tbody = document.getElementById('sp-tbody');
  tbody.innerHTML = '';
  stopsHere.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="color:#e94560;font-weight:bold">${s.time}</td><td>${s.train}</td><td style="color:#aaa">${s.next}</td>`;
    tbody.appendChild(tr);
  });

  panel.style.display = 'block';
  if (st) map.panTo([st.lat, st.lon]);
}
function closeStationPanel() { document.getElementById('station-panel').style.display = 'none'; }

function openTrainPanel(route) {
  const panel = document.getElementById('train-panel');
  document.getElementById('tp-title').textContent = `Train ${route.train_no}`;

  const container = document.getElementById('tp-stops');
  container.innerHTML = '';
  route.stops.forEach(s => {
    const isActive = Math.abs(currentMinutes - s.time_min) <= 2;
    const div = document.createElement('div');
    div.className = 'train-stop' + (isActive ? ' active' : '');
    div.innerHTML = `<span class="ts-time">${formatTime(s.time_min)}</span><span class="ts-station">${s.station}</span>`;
    div.addEventListener('click', () => { map.panTo([s.lat, s.lon]); openStationPanel(s.station); });
    container.appendChild(div);
  });
  panel.style.display = 'block';
}
function closeTrainPanel() { document.getElementById('train-panel').style.display = 'none'; }

// ===================== SEARCH =====================
function onSearch(query) {
  const box = document.getElementById('search-results');
  if (!query) { box.style.display = 'none'; return; }
  const matches = stations.filter(s => s.name.includes(query)).slice(0, 15);
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = '';
  matches.forEach(s => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.textContent = s.name;
    div.addEventListener('click', () => {
      document.getElementById('search-input').value = s.name;
      box.style.display = 'none';
      map.setView([s.lat, s.lon], 9);
      openStationPanel(s.name);
    });
    box.appendChild(div);
  });
  box.style.display = 'block';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#search-box')) document.getElementById('search-results').style.display = 'none';
});

init();
</script>
</body>
</html>
