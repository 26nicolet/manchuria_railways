<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>滿洲支那汽車時間表 — Home</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* important */
    }
    /* #main-video {
      position: absolute;
      top: 0; left: -25%;
      width: 120%; height: 100%;
      object-fit: cover;
      z-index: 1;
    } */

    #main-video {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 150vw;   /* increase until bars disappear */
      height: 150vh;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: -1;
    }

    #overlay-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 3rem;
      font-family: 'Noto Serif JP', 'Georgia', serif;
      color: #e94560;
      font-weight: bold;
      letter-spacing: 0.2em;
      text-shadow: 2px 2px 8px #000, 0 0 20px #0008;
      z-index: 3;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
    }
    #enter-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      font-size: 1.3rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 36px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-weight: bold;
      letter-spacing: 0.05em;
      box-shadow: 0 2px 12px #0008;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s, background 0.2s;
    }
    #enter-btn.visible { opacity: 1; pointer-events: auto; }
    #enter-btn:hover { background: #333; }
    #fade-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s;
    }
    #fade-overlay.active { opacity: 1; }

    #overlay-image {
      position: fixed;   /* stays in place even when scrolling */
      top: 20px;         /* adjust spacing from top */
      left: 20px;        /* adjust spacing from left */
      z-index: 2;        /* above video */
      width: 150px;      /* control size */
      height: auto;
    }
  </style>
</head>
<body>
  <video id="main-video" src="Generate_Moving_Train_GIF_From_Screenshot.mp4" autoplay muted playsinline></video>
  <!-- <img id="overlay-image" src="Naval_Ensign_of_Japan.svg" alt=""> -->
  <div id="overlay-text">滿洲汽車時間表</div>
  <button id="enter-btn">Enter the Map</button>
  <div id="fade-overlay"></div>
  <script>
    const video = document.getElementById('main-video');
    const overlay = document.getElementById('overlay-text');
    const btn = document.getElementById('enter-btn');
    const fadeOverlay = document.getElementById('fade-overlay');

    video.addEventListener('ended', () => {
      // Video naturally freezes on last frame — just show the button
      overlay.style.opacity = '0';
      setTimeout(() => { btn.classList.add('visible'); }, 800);
    });

    btn.addEventListener('click', () => {
      fadeOverlay.classList.add('active');
      setTimeout(() => { window.location.href = 'map.html'; }, 1000);
    });
  </script>
</body>
</html>
